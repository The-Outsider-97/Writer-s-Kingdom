<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader · Writer's Kingdom</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/reader.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
</head>
<body data-page="reader">
<div class="app-shell">
    <header class="app-header">
        <div class="header-left">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
            <div class="brand"><i class="fas fa-feather-alt"></i><h1>writer's kingdom</h1></div>
        </div>
        <nav class="main-nav">
            <a href="../index.html" data-page="home">Home</a>
            <a href="reader.html" data-page="reader">Reader</a>
            <a href="theories.html" data-page="theories">Style Theories</a>
            <a href="structures.html" data-page="structures">Story Structures</a>
            <a href="tools.html" data-page="tools">Tools</a>
        </nav>
    </header>
    <main class="page-content reader-layout">
        <aside class="panel">
            <div class="upload-btn-wrapper">
                <button class="upload-btn" id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> Upload file</button>
                <input type="file" id="fileInput" accept=".pdf,.docx,.txt" multiple>
            </div>
            <p class="muted" style="margin-top:10px;">PDF · DOCX · TXT</p>
            <ul class="file-list" id="fileList"></ul>
        </aside>
        <section class="panel">
            <div class="viewer-header">
                <span id="viewerTitle">📖 Select a file</span>
                <button class="readmode-btn" id="readModeToggle"><i class="fas fa-eye"></i> Read mode</button>
            </div>
            <div class="viewer-content" id="viewerContent"></div>
            <div class="comment-section">
                <h3><i class="far fa-comment-dots"></i> Comments</h3>
                <div class="comment-list" id="commentList"></div>
                <div class="comment-input-area">
                    <input type="text" id="commentInput" placeholder="Add a note..." autocomplete="off">
                    <button class="primary-btn" id="addCommentBtn" disabled><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="../js/theme-toggle.js"></script>
<script src="../js/script.js"></script>
<script src="../js/reader.js"></script>
</body>
</html>
